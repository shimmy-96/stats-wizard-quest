<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>*{margin:0;padding:0;box-sizing:border-box}</style>
<title>Stats Wizard Quest — סטטיסטיקה ב'</title>
<style>
/* ============ Stats Wizard Quest — design system ============ */
:root{
  --paper:#F4F0E6; --paper-2:#EEE8D9; --card:#FFFDF8; --card-2:#FBF7EE;
  --ink:#1B2A2C; --ink-soft:#4A5A5B; --ink-faint:#7C8A88;
  --line:#E2D9C6; --line-soft:#EDE6D6;
  --teal:#0E8A7C; --teal-deep:#0B6B60; --teal-soft:#D6ECE7;
  --coral:#D8593F; --coral-soft:#F6DDD5;
  --gold:#C98A22; --gold-soft:#F3E5C6;
  --grape:#6B5BB0; --grape-soft:#E4DEF4;
  --good:#1F9E6E; --good-soft:#D3EEE1;
  --bad:#CC3A2E; --bad-soft:#F5D8D4;
  --shadow:0 1px 2px rgba(27,42,44,.04),0 6px 18px rgba(27,42,44,.07);
  --shadow-lg:0 2px 6px rgba(27,42,44,.06),0 18px 44px rgba(27,42,44,.13);
  --r:16px; --r-sm:10px; --r-lg:22px;
  --fs:clamp(15px,1.6vw,17px);
  --font:"Assistant","Segoe UI",system-ui,-apple-system,"Arial Hebrew",Arial,sans-serif;
  --mono:"SF Mono",ui-monospace,"Menlo",Consolas,monospace;
}
@media (prefers-color-scheme:dark){
  :root{
    --paper:#12201F; --paper-2:#0E1A19; --card:#1A2A28; --card-2:#213432;
    --ink:#ECE6D6; --ink-soft:#AFC0BC; --ink-faint:#7E918D;
    --line:#2C3E3B; --line-soft:#25352F;
    --teal:#2FC8B4; --teal-deep:#5FD9C8; --teal-soft:#183430;
    --coral:#EE7A5F; --coral-soft:#3A231C;
    --gold:#E1AC4E; --gold-soft:#382E19;
    --grape:#A99CE6; --grape-soft:#282146;
    --good:#3FD08C; --good-soft:#143324;
    --bad:#F0796B; --bad-soft:#3A1C18;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 22px rgba(0,0,0,.35);
    --shadow-lg:0 2px 8px rgba(0,0,0,.4),0 20px 50px rgba(0,0,0,.5);
  }
}
:root[data-theme="light"]{
  --paper:#F4F0E6; --paper-2:#EEE8D9; --card:#FFFDF8; --card-2:#FBF7EE;
  --ink:#1B2A2C; --ink-soft:#4A5A5B; --ink-faint:#7C8A88;
  --line:#E2D9C6; --line-soft:#EDE6D6; --teal:#0E8A7C; --teal-deep:#0B6B60; --teal-soft:#D6ECE7;
  --coral:#D8593F; --coral-soft:#F6DDD5; --gold:#C98A22; --gold-soft:#F3E5C6;
  --grape:#6B5BB0; --grape-soft:#E4DEF4; --good:#1F9E6E; --good-soft:#D3EEE1;
  --bad:#CC3A2E; --bad-soft:#F5D8D4;
  --shadow:0 1px 2px rgba(27,42,44,.04),0 6px 18px rgba(27,42,44,.07);
  --shadow-lg:0 2px 6px rgba(27,42,44,.06),0 18px 44px rgba(27,42,44,.13);
}
:root[data-theme="dark"]{
  --paper:#12201F; --paper-2:#0E1A19; --card:#1A2A28; --card-2:#213432;
  --ink:#ECE6D6; --ink-soft:#AFC0BC; --ink-faint:#7E918D;
  --line:#2C3E3B; --line-soft:#25352F; --teal:#2FC8B4; --teal-deep:#5FD9C8; --teal-soft:#183430;
  --coral:#EE7A5F; --coral-soft:#3A231C; --gold:#E1AC4E; --gold-soft:#382E19;
  --grape:#A99CE6; --grape-soft:#282146; --good:#3FD08C; --good-soft:#143324;
  --bad:#F0796B; --bad-soft:#3A1C18;
  --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 22px rgba(0,0,0,.35);
  --shadow-lg:0 2px 8px rgba(0,0,0,.4),0 20px 50px rgba(0,0,0,.5);
}
*{box-sizing:border-box}
#swq{direction:rtl;font-family:var(--font);font-size:var(--fs);line-height:1.65;color:var(--ink);
  background:var(--paper);min-height:100vh;-webkit-font-smoothing:antialiased;text-align:right;
  background-image:radial-gradient(circle at 12% 8%,var(--paper-2) 0,transparent 45%),radial-gradient(circle at 88% 92%,var(--paper-2) 0,transparent 45%);}
#swq h1,#swq h2,#swq h3,#swq h4{margin:0;line-height:1.25;text-wrap:balance;font-weight:800;letter-spacing:-.01em}
#swq p{margin:0}
#swq button{font-family:inherit;font-size:inherit;cursor:pointer;border:0;color:inherit}
:where(#swq) button{background:none}
#swq :focus-visible{outline:2.5px solid var(--teal);outline-offset:2px;border-radius:6px}
.wrap{max-width:1080px;margin:0 auto;padding:0 20px}
/* ---- header ---- */
.hd{position:sticky;top:0;z-index:40;background:color-mix(in srgb,var(--paper) 86%,transparent);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--line-soft)}
.hd-in{display:flex;align-items:center;gap:12px;padding:11px 20px;max-width:1080px;margin:0 auto;flex-wrap:wrap}
.hd-stats{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hstat{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--ink-soft);background:color-mix(in srgb,var(--card-2) 82%,transparent);border:1px solid var(--line-soft);border-radius:99px;padding:4px 11px;white-space:nowrap;backdrop-filter:blur(6px)}
.hstat .hdot{width:7px;height:7px;border-radius:99px;background:var(--ink-faint);box-shadow:0 0 0 3px transparent}
.hstat b{color:var(--ink);font-weight:800;font-variant-numeric:tabular-nums;direction:ltr;letter-spacing:.01em}
.hstat.s-att .hdot{background:var(--gold);box-shadow:0 0 8px color-mix(in srgb,var(--gold) 65%,transparent)}
.hstat.s-done .hdot{background:var(--good);box-shadow:0 0 8px color-mix(in srgb,var(--good) 65%,transparent)}
.hstat.s-avg .hdot{background:var(--teal);box-shadow:0 0 8px color-mix(in srgb,var(--teal) 65%,transparent)}
.hstat.s-att{border-color:color-mix(in srgb,var(--gold) 35%,var(--line-soft))}
.hstat.s-done{border-color:color-mix(in srgb,var(--good) 35%,var(--line-soft))}
.hstat.s-avg{border-color:color-mix(in srgb,var(--teal) 35%,var(--line-soft))}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;letter-spacing:-.02em;cursor:pointer}
.brand .flask{font-size:20px;filter:drop-shadow(0 2px 3px rgba(14,138,124,.35))}
.brand b{color:var(--teal-deep)}
.hd-spacer{flex:1}
.pbar{height:7px;background:var(--line-soft);border-radius:99px;overflow:hidden;flex:1;max-width:240px;min-width:80px}
.pbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--teal-deep));border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);box-shadow:0 0 8px color-mix(in srgb,var(--teal) 60%,transparent)}
.pct{font-variant-numeric:tabular-nums;font-weight:700;color:var(--ink-soft);font-size:13px;min-width:34px}
.icon-btn{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:var(--card);
  border:1px solid var(--line);box-shadow:var(--shadow);transition:transform .15s,background .2s;font-size:17px}
.icon-btn:hover{transform:translateY(-1px);background:var(--card-2)}
/* ---- generic ---- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:13px;font-weight:800;
  background:var(--teal);color:#fff;box-shadow:0 4px 14px color-mix(in srgb,var(--teal) 40%,transparent);
  transition:transform .15s,box-shadow .2s,filter .2s}
.btn:hover{transform:translateY(-2px);filter:brightness(1.05)}
.btn:active{transform:translateY(0)}
.btn.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line);box-shadow:var(--shadow)}
.btn.ghost:hover{background:var(--card-2)}
.btn.sm{padding:8px 15px;border-radius:10px;font-size:14px}
.btn.grape{background:var(--grape);box-shadow:0 4px 14px color-mix(in srgb,var(--grape) 40%,transparent)}
.btn.coral{background:var(--coral);box-shadow:0 4px 14px color-mix(in srgb,var(--coral) 40%,transparent)}
.eyebrow{font-size:12.5px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--teal-deep)}
.chip{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:99px;font-size:12.5px;font-weight:700;
  background:var(--teal-soft);color:var(--teal-deep)}
.chip.gold{background:var(--gold-soft);color:var(--gold)}
.chip.grape{background:var(--grape-soft);color:var(--grape)}
.chip.coral{background:var(--coral-soft);color:var(--coral)}
.muted{color:var(--ink-soft)}
.faint{color:var(--ink-faint)}
.view{animation:fade .4s ease}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
/* math */
.mq{font-family:var(--mono);direction:ltr;display:inline-flex;align-items:center;gap:.12em;unicode-bidi:isolate}
.frac{display:inline-flex;flex-direction:column;text-align:center;vertical-align:middle;margin:0 .18em;line-height:1.05}
.frac>span{unicode-bidi:plaintext}
.frac>span:first-child{border-bottom:1.6px solid currentColor;padding:0 .35em .06em}
.frac>span:last-child{padding:.06em .35em 0}
.sqsym{align-self:center;margin-inline-end:-.02em}
.rad{border-top:1.6px solid currentColor;padding:0 .15em}
.sqsym.tall{font-size:2.05em;line-height:.7;align-self:stretch;display:inline-flex;align-items:flex-end;margin-inline-end:-.06em}
.rad.tall{padding-top:.16em}
.formula{background:var(--card-2);border:1px solid var(--line-soft);border-radius:12px;padding:14px 16px;margin:10px 0;
  display:flex;flex-wrap:wrap;align-items:center;gap:6px;font-size:1.05em;overflow-x:auto}
sup{font-size:.72em}
/* hero */
.hero{text-align:center;padding:38px 0 8px}
.hero .flaskbig{font-size:56px;display:inline-block;animation:bob 4s ease-in-out infinite;filter:drop-shadow(0 8px 12px rgba(14,138,124,.3))}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-9px) rotate(4deg)}}
.hero h1{font-size:clamp(30px,5vw,46px);margin:14px 0 6px;background:linear-gradient(120deg,var(--teal-deep),var(--grape));-webkit-background-clip:text;background-clip:text;color:transparent}
.hero .sub{font-size:clamp(16px,2.2vw,20px);font-weight:700;color:var(--ink)}
.hero .who{color:var(--ink-soft);margin-top:4px;font-size:14.5px}
.hero-cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:22px}
/* progress ring */
.ringrow{display:flex;align-items:center;justify-content:center;gap:22px;margin:26px auto 6px;flex-wrap:wrap;max-width:620px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px 24px;box-shadow:var(--shadow)}
.ringstats{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.ringstats .ringstat{flex:1;min-width:120px;text-align:center;background:var(--card-2);border:1px solid var(--line-soft);border-radius:12px;padding:10px 12px}
.frc{direction:ltr;display:inline-block;unicode-bidi:isolate}
.ring{position:relative;width:96px;height:96px;flex:none}
.ring svg{transform:rotate(-90deg)}
.ring .rt{position:absolute;inset:0;display:grid;place-items:center;font-weight:800;font-size:22px;font-variant-numeric:tabular-nums;color:var(--teal-deep)}
.ringstat{font-size:14px;color:var(--ink-soft)}
.ringstat b{display:block;font-size:22px;color:var(--ink);font-variant-numeric:tabular-nums}
/* section titles */
.sec-t{display:flex;align-items:center;gap:10px;margin:34px 0 14px}
.sec-t h2{font-size:23px}
.sec-t .ln{flex:1;height:1px;background:var(--line)}
/* topic grid */
.grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(268px,1fr))}
.tcard{position:relative;text-align:right;padding:20px;border-radius:var(--r);background:var(--card);border:1px solid var(--line);
  box-shadow:var(--shadow);transition:transform .18s,box-shadow .25s,border-color .2s;overflow:hidden;display:flex;flex-direction:column;gap:8px;min-height:172px}
.tcard::before{content:"";position:absolute;inset-inline:0;top:0;height:3px;background:linear-gradient(90deg,var(--teal),var(--grape));transform:scaleX(0);transform-origin:right;transition:transform .3s ease}
.tcard:hover::before{transform:scaleX(1)}
.tcard:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:color-mix(in srgb,var(--teal) 45%,var(--line))}
.tcard .num{position:absolute;inset-inline-end:16px;top:14px;font-size:13px;font-weight:800;color:var(--ink-faint);font-variant-numeric:tabular-nums}
.tcard .emo{font-size:30px}
.tcard h3{font-size:18px}
.tcard .goal{font-size:14px;color:var(--ink-soft);flex:1}
.tcard .foot{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:4px}
.dots{display:flex;gap:5px}
.dots i{width:8px;height:8px;border-radius:99px;background:var(--line);transition:background .3s,box-shadow .3s}
.dots i.on{background:var(--teal);box-shadow:0 0 7px color-mix(in srgb,var(--teal) 70%,transparent)}
.tcard .score{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:800;font-variant-numeric:tabular-nums}
.tcard.is-done{border-color:color-mix(in srgb,var(--good) 40%,var(--line))}
.tcard.is-done::before{transform:scaleX(1);background:linear-gradient(90deg,var(--good),var(--teal))}
.donechk{width:19px;height:19px;border-radius:99px;display:inline-grid;place-items:center;font-size:11px;font-weight:900;color:#fff;
  background:linear-gradient(135deg,var(--good),var(--teal));box-shadow:0 1px 5px color-mix(in srgb,var(--good) 55%,transparent)}
.tools{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(210px,1fr))}
.tool{display:flex;gap:12px;align-items:center;padding:15px 16px;border-radius:var(--r);background:var(--card-2);
  border:1px solid var(--line);box-shadow:var(--shadow);transition:transform .16s,box-shadow .2s;text-align:right}
.tool:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.tool .te{font-size:24px}
.tool b{display:block;font-size:15.5px}
.tool span{font-size:13px;color:var(--ink-soft)}
/* topic page */
.subnav{display:flex;gap:8px;flex-wrap:wrap;position:sticky;top:56px;z-index:20;padding:12px 0;background:color-mix(in srgb,var(--paper) 88%,transparent);backdrop-filter:blur(8px)}
.subnav button{padding:8px 14px;border-radius:99px;font-size:13.5px;font-weight:700;background:var(--card);border:1px solid var(--line);color:var(--ink-soft);transition:.18s}
.subnav button.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.subnav button:hover:not(.active){background:var(--card-2)}
.block{margin:18px 0}
.block h3{font-size:19px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.block h3 .k{width:26px;height:26px;border-radius:8px;background:var(--teal-soft);color:var(--teal-deep);display:grid;place-items:center;font-size:14px;flex:none}
.note{border-inline-start:4px solid var(--gold);background:var(--gold-soft);padding:11px 14px;border-radius:10px;margin:12px 0;color:var(--ink)}
.note.trap{border-color:var(--coral);background:var(--coral-soft)}
.note.tip{border-color:var(--teal);background:var(--teal-soft)}
.deftbl{width:100%;border-collapse:collapse;margin:10px 0;font-size:14.5px;overflow:hidden;border-radius:12px;box-shadow:var(--shadow)}
.deftbl th,.deftbl td{border:1px solid var(--line);padding:9px 12px;text-align:right}
.deftbl th{background:var(--card-2);font-weight:800}
.deftbl tr:nth-child(even) td{background:var(--card-2)}
.tblwrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.fulltbl{margin-top:12px}
.fulltbl>summary{cursor:pointer;font-weight:800;color:var(--teal-deep);padding:8px 12px;background:var(--card-2);border:1px solid var(--line-soft);border-radius:10px;list-style:none;user-select:none}
.fulltbl>summary::-webkit-details-marker{display:none}
.fulltbl[open]>summary{border-radius:10px 10px 0 0}
.reftbl{font-size:12.5px;font-variant-numeric:tabular-nums;direction:ltr}
.reftbl th,.reftbl td{padding:4px 7px;text-align:center;white-space:nowrap}
.reftbl thead th{position:sticky;top:0}
.reftbl tbody th{background:var(--card-2);font-weight:800}
/* formula breakdown */
.fbreak{display:grid;gap:8px;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));margin-top:10px}
.fbreak div{background:var(--card-2);border:1px solid var(--line-soft);border-radius:10px;padding:9px 11px;font-size:13.5px}
.fbreak b{color:var(--teal-deep)}
/* guided example */
.gstep{border:1px solid var(--line);border-radius:12px;margin:9px 0;overflow:hidden;background:var(--card)}
.gstep>button{width:100%;display:flex;align-items:center;gap:11px;padding:13px 15px;text-align:right;font-weight:700}
.gstep .gi{width:26px;height:26px;border-radius:99px;background:var(--grape-soft);color:var(--grape);display:grid;place-items:center;font-size:13px;font-weight:800;flex:none}
.gstep .rev{max-height:0;overflow:hidden;transition:max-height .35s ease}
.gstep.open .rev{max-height:340px}
.gstep .rev-in{padding:2px 52px 14px;color:var(--ink-soft)}
.gstep .arw{margin-inline-start:auto;transition:transform .3s;color:var(--ink-faint)}
.gstep.open .arw{transform:rotate(180deg)}
/* sims */
.sim{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);margin:14px 0}
.sim svg{display:block;width:100%;height:auto;border-radius:10px}
.ctrls{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));margin-top:12px}
.ctrl label{font-size:13px;font-weight:700;color:var(--ink-soft);display:flex;justify-content:space-between}
.ctrl b{color:var(--teal-deep);font-variant-numeric:tabular-nums}
input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:6px;border-radius:99px;background:var(--line);margin-top:7px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:19px;height:19px;border-radius:99px;background:var(--teal);cursor:pointer;box-shadow:0 2px 5px rgba(0,0,0,.2);border:2px solid var(--card)}
input[type=range]::-moz-range-thumb{width:19px;height:19px;border-radius:99px;background:var(--teal);cursor:pointer;border:2px solid var(--card)}
.readout{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
.readout .r{background:var(--card-2);border:1px solid var(--line-soft);border-radius:10px;padding:8px 13px;font-size:14px}
.readout .r b{font-variant-numeric:tabular-nums;color:var(--teal-deep);font-size:16px;display:block}
.segbtns{display:inline-flex;background:var(--card-2);border:1px solid var(--line);border-radius:10px;padding:3px;gap:3px}
.segbtns button{padding:6px 13px;border-radius:8px;font-size:13px;font-weight:700;color:var(--ink-soft)}
#swq .segbtns button.on{background:var(--teal);color:#fff}
/* quiz */
.quiz{margin-top:8px}
.qcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:20px;margin:14px 0}
.qhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.qnum{font-size:13px;font-weight:800;color:var(--ink-faint);font-variant-numeric:tabular-nums}
.qtag{font-size:11.5px}
.qtext{font-size:16.5px;font-weight:700;margin:6px 0 14px;line-height:1.5}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{display:flex;align-items:center;gap:11px;padding:13px 15px;border-radius:12px;border:1.6px solid var(--line);background:var(--card-2);
  cursor:pointer;transition:.16s;text-align:right;font-weight:600}
.opt:hover{border-color:var(--teal);background:var(--teal-soft)}
.opt .mk{width:22px;height:22px;border-radius:99px;border:2px solid var(--line);flex:none;display:grid;place-items:center;font-size:12px;transition:.15s}
.opt.sel{border-color:var(--teal);background:var(--teal-soft)}
.opt.sel .mk{background:var(--teal);border-color:var(--teal);color:#fff}
.opt.correct{border-color:var(--good);background:var(--good-soft)}
.opt.correct .mk{background:var(--good);border-color:var(--good);color:#fff}
.opt.wrong{border-color:var(--bad);background:var(--bad-soft)}
.opt.wrong .mk{background:var(--bad);border-color:var(--bad);color:#fff}
.opt.disabled{cursor:default;pointer-events:none}
.numin{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:6px 0}
.numin input,.field input{font-family:var(--mono);font-size:16px;padding:11px 14px;border-radius:11px;border:1.6px solid var(--line);
  background:var(--card-2);color:var(--ink);width:150px;text-align:center;direction:ltr}

<script>
"use strict";
/* =================== math render helpers =================== */
function frac(a,b){return '<span class="frac"><span'+hdir(a)+'>'+a+'</span><span'+hdir(b)+'>'+b+'</span></span>';}
function hdir(s){return /[֐-׿]/.test(s)?' dir="rtl"':'';}
function sqrt(x){var tall=/class="frac"/.test(x);return '<span class="sqsym'+(tall?' tall':'')+'">√</span><span class="rad'+(tall?' tall':'')+'">'+x+'</span>';}
function mq(s){return '<span class="mq">'+s+'</span>';}
const SUP={'2':'²','1':'¹','0':'⁰'};

/* =================== state =================== */
const LS='swq_state_v1';
let ST=normalizeState(load());
function load(){try{return JSON.parse(localStorage.getItem(LS))||fresh();}catch(e){return fresh();}}
function fresh(){return{theme:null,topics:{},mistakes:{},examBest:null,detail:'full',flashcards:{seen:{},known:0,missed:0}};}
function normalizeState(s){
 s=s||fresh();
 if(!s.topics)s.topics={};
 if(!s.mistakes)s.mistakes={};
 if(!s.detail)s.detail='full';
 if(!s.flashcards)s.flashcards={seen:{},known:0,missed:0};
 if(!s.flashcards.seen)s.flashcards.seen={};
 if(!Number.isFinite(s.flashcards.known))s.flashcards.known=0;
 if(!Number.isFinite(s.flashcards.missed))s.flashcards.missed=0;
 return s;
}
function save(){try{localStorage.setItem(LS,JSON.stringify(ST));}catch(e){}}
function topicState(id){return ST.topics[id]||(ST.topics[id]={best:0,done:false});}
function addMistake(tag,n){if(!tag)return;ST.mistakes[tag]=(ST.mistakes[tag]||0)+(n||1);}
function markFlashcard(id,known){
 ST.flashcards.seen[id]=known?'known':'missed';
 ST.flashcards.known=Object.values(ST.flashcards.seen).filter(x=>x==='known').length;
 ST.flashcards.missed=Object.values(ST.flashcards.seen).filter(x=>x==='missed').length;
 save();
}

/* =================== mistake tag labels =================== */
const MTAG={
 wrong_test:'בחירת המבחן הנכון',sd_vs_se:'הבחנה בין ס״ת (SD) לטעות תקן (SE)',df_error:'חישוב דרגות חופש (df)',
 one_tail_two_tail:'חד-צדדי מול דו-צדדי',p_value:'פירוש p-value',ci_width:'רוחב רווח סמך',
 alpha_beta_power:'טעויות ועוצמה (α/β/1−β)',z_vs_t:'מתי z ומתי t',paired_vs_independent:'תלויים מול בלתי-תלויים',
 levene_row:'קריאת מבחן Levene',pooled_vs_welch:'pooled מול Welch',r_vs_r_squared:'r מול R²',
 correlation_causation:'מתאם מול סיבתיות',anova_posthoc:'ANOVA ומבחני המשך',anova_table:'השלמת טבלת ANOVA',
 interaction:'אינטראקציה ב-ANOVA דו-כיווני',chi_expected:'חישוב שכיחות צפויה (E)',chi_df:'דרגות חופש ב-χ²',
 cramers_phi:'עוצמת קשר (Cramér/φ)',conclusion_wording:'ניסוח מסקנה נכון',sampling_dist:'תכונות התפלגות הדגימה',
 crit_value:'קריאת ערך קריטי מהלוח',sample_size:'חישוב גודל מדגם'
};

/* =================== TOPICS =================== */
const TOPICS=[
{id:'z',num:1,emo:'📈',title:'התפלגות הדגימה + מבחן Z',
 goal:'להבין מהי התפלגות הדגימה ומתי משתמשים במבחן Z לממוצע יחיד',
 what:`בודקים האם ממוצע של מדגם יחיד שונה מערך ידוע, כאשר סטיית התקן של האוכלוסייה (σ) <b>ידועה</b>. הבסיס לכל הקורס: התפלגות הדגימה של הממוצע.`,
 theory:[
  `<b>התפלגות הדגימה של הממוצע</b> — אם ניקח אינסוף מדגמים בגודל n ונחשב לכל אחד את הממוצע, הממוצעים האלה מתפלגים בהתפלגות משלהם. זו לא התפלגות האוכלוסייה ולא מדגם בודד — אלא התפלגות של <i>ממוצעים</i>.`,
  `<b>משפט הגבול המרכזי — 3 תכונות:</b>`,
  `<table class="deftbl"><tr><th>תכונה</th><th>ערך</th></tr>
   <tr><td>ממוצע התפלגות הדגימה</td><td>= μ (ממוצע האוכלוסייה) — אומד בלתי-מוטה</td></tr>
   <tr><td>שונות התפלגות הדגימה</td><td>= σ²/n → טעות תקן ${mq('SE = '+frac('σ',sqrt('n')))}</td></tr>
   <tr><td>צורתה</td><td>נורמלית אם n≥30 <b>או</b> האוכלוסייה נורמלית</td></tr></table>`,
  `<b>מבחן Z לממוצע יחיד</b> — כשה-σ ידועה. ממירים את ממוצע המדגם לציון תקן: ${mq('Z = '+frac('x̄ − μ₀','σ/'+sqrt('n')))}. אין דרגות חופש. משווים ל-Z קריטי מהלוח.`,
  `<b>כיווניות (לפי H1, לא לפי המדגם):</b> "שונה מ־" → דו-צדדי · "גבוה/נמוך מ־" → חד-צדדי. ערכים קריטיים נפוצים: דו-צדדי 5% ← ±1.96 · חד-צדדי 5% ← 1.645 · דו-צדדי 1% ← ±2.576.`,
  `<b>p-value</b> = רמת המובהקות הנמוכה ביותר שבה עדיין דוחים את H0. אם p &lt; α → דוחים.`
 ],
 formulas:[
  {name:'טעות תקן',tex:mq('SE = '+frac('σ',sqrt('n')))},
  {name:'מבחן Z לממוצע יחיד',tex:mq('Z = '+frac('x̄ − μ₀','σ/'+sqrt('n')))},
  {name:'כיוון הפוך (ערך מהסתברות)',tex:mq('x = μ + Z · SE')}
 ],

{id:'power',num:2,emo:'⚖️',title:'טעויות בהסקה ועוצמת מבחן',
 goal:'להבין טעות סוג I ו-II, α, β ועוצמה — ומה מגדיל עוצמה',
 what:`בסוף כל מבחן החוקר <b>אף פעם לא יודע</b> אם צדק — רק בהסתברות. מבינים את שני סוגי הטעויות ואת עוצמת המבחן.`,
 theory:[
  `<table class="deftbl"><tr><th></th><th>דוחים H0</th><th>לא דוחים H0</th></tr>
   <tr><th>H0 נכונה</th><td>❌ טעות סוג I = <b>α</b><br>(אזעקת שווא)</td><td>✅ ביטחון = 1−α</td></tr>
   <tr><th>H0 שגויה</th><td>✅ עוצמה = <b>1−β</b></td><td>❌ טעות סוג II = <b>β</b><br>(החמצה)</td></tr></table>`,
  `<b>טעות סוג I (α):</b> דוחים את H0 למרות שהיא נכונה. "המלצה שגויה". החוקר קובע אותה מראש (בד״כ 0.05) — <i>אפריורית</i>.`,
  `<b>טעות סוג II (β):</b> לא דוחים את H0 למרות שהיא שגויה. "פספסנו אפקט אמיתי".`,
  `<b>עוצמה (1−β):</b> הסיכוי לדחות את H0 כשהיא באמת שגויה = הסיכוי לגלות אפקט אמיתי.`,
  `<b>מה מגדיל עוצמה?</b> n גדול יותר · α גדול יותר · אפקט גדול יותר · שונות קטנה יותר · מבחן חד-צדדי (בכיוון הנכון). כולם מקטינים את β.`,
  `<b>Trade-off:</b> הקטנת α (למשל מ-0.05 ל-0.01) מקטינה טעות סוג I אבל <i>מגדילה</i> את β ומקטינה עוצמה. הדרך הבטוחה להגדיל עוצמה בלי לפגוע ב-α: <b>להגדיל את המדגם</b>.`
 ],
 formulas:[
  {name:'רמת ביטחון',tex:mq('1 − α')},
  {name:'עוצמת מבחן',tex:mq('Power = 1 − β')}
 ],

  steps:[

   {t:'איזו טעות?',r:'הוא לא דחה את H0 למרות שהיא שגויה (יש הבדל) → <b>טעות סוג II (β)</b> — החמצה.'},

  ]},

{id:'ci',num:3,emo:'📐',title:'רווח בר-סמך וגודל מדגם',
 goal:'לאמוד פרמטר בטווח ולחשב גודל מדגם מינימלי',
 what:`במקום אומדן נקודתי בודד (הממוצע), נותנים <b>טווח</b> שברמת ביטחון מסוימת כולל את הפרמטר. וגם: כמה נבדקים צריך כדי לקבל רוחב רווח רצוי.`,
 theory:[
  `<b>אומדן נקודתי</b> — מספר יחיד (הממוצע במדגם). חסרון: כמעט בטוח שלא בדיוק שווה לפרמטר. <b>אומדן מרווחי</b> — טווח ערכים סביב האומדן.`,
  `<b>המבנה הכללי:</b> ${mq('CI = O ∓ (Z/t)<sub>α/2</sub> · SE')} כאשר O הוא האומדן הנקודתי (הממוצע). תמיד α/2 (מחלקים את הטעות לשני זנבות). בוחרים Z או t לפי אותם כללים כמו במבחן השערות.`,
  `<b>מה משפיע על רוחב הרווח:</b>`,
  `<table class="deftbl"><tr><th>גורם</th><th>השפעה על הרוחב</th></tr>
   <tr><td>רמת ביטחון גבוהה יותר (95%→99%)</td><td>רווח <b>רחב</b> יותר</td></tr>
   <tr><td>n גדול יותר</td><td>רווח <b>צר</b> יותר (SE קטן)</td></tr>
   <tr><td>שונות/ס״ת גדולה יותר</td><td>רווח <b>רחב</b> יותר</td></tr></table>`,
  `<b>גודל מדגם מינימלי</b> — הופכים את הנוסחה כדי לבודד את n: ${mq('n ≥ ('+frac('Z<sub>α/2</sub> · σ','חצי-רוחב')+')'+SUP['2'])}. <b>תמיד מעגלים כלפי מעלה.</b>`,
  `<b>קשר למבחן השערות:</b> אם ערך ה-H0 <b>לא נמצא</b> בתוך רווח הסמך → דוחים את H0.`,
  `<div class="note tip"><b>ניסוח מדויק:</b> "ברמת ביטחון 95%" לא אומר שיש הסתברות 95% שהפרמטר בטווח הספציפי הזה — אלא ש<b>השיטה</b> מייצרת רווחים ש-95% מהם יכילו את הפרמטר. בניסוח מקובל למבחן: "אנחנו בטוחים ב-95% שהפרמטר בטווח".</div>`,
  `<b>⭐ רווח סמך להפרש בין ממוצעים</b> — לא רק לממוצע יחיד! זה חומר מבחן. הבסיס זהה: <b>הפרש האומדנים ∓ ערך-קריטי · SE</b>.`,
  `<b>בלתי-תלויים, שונויות שוות:</b> ${mq('(x̄₁−x̄₂) ∓ t<sub>α/2</sub>·'+sqrt('Ŝ<sub>p</sub>'+SUP['2']+'/n₁ + Ŝ<sub>p</sub>'+SUP['2']+'/n₂'))} , df = n₁+n₂−2. (Ŝ<sub>p</sub>² = השונות המשותפת מנושא t).`,
  `<b>בלתי-תלויים, שונויות שונות (Welch):</b> ${mq('(x̄₁−x̄₂) ∓ t<sub>α/2</sub>·'+sqrt('Ŝ₁'+SUP['2']+'/n₁ + Ŝ₂'+SUP['2']+'/n₂'))} , df מתוקן (מהפלט, או נוסחת Welch מדף הנוסחאות).`,
  `<b>מדגמים תלויים:</b> ${mq('d̄ ∓ t<sub>α/2</sub>·(Ŝ<sub>d</sub>/'+sqrt('n')+')')} , df = n−1. <b>כלל:</b> אם 0 <b>בתוך</b> הרווח → אין הבדל מובהק; אם 0 <b>מחוץ</b> → יש הבדל מובהק.`,
  `<div class="note trap"><b>מלכודת:</b> שים לב אם הנתון הוא שונות <b>מתוקנת</b> (Ŝ², חלוקה ב-n−1) או <b>לא מתוקנת</b> (S², חלוקה ב-n). במבחני t ורווחי סמך משתמשים במתוקנת; אם נתון S לא-מתוקן, במונה מכפילים ב-n (לא n−1).</div>`
 ],
 formulas:[
  {name:'רווח בר-סמך (ממוצע יחיד)',tex:mq('CI = O ∓ (Z/t)<sub>α/2</sub> · SE')},
  {name:'CI להפרש (שונויות שוות)',tex:mq('(x̄₁−x̄₂) ∓ t<sub>α/2</sub>·'+sqrt('Ŝ<sub>p</sub>'+SUP['2']+'/n₁ + Ŝ<sub>p</sub>'+SUP['2']+'/n₂'))},
  {name:'CI להפרש (תלויים)',tex:mq('d̄ ∓ t<sub>α/2</sub>·(Ŝ<sub>d</sub>/'+sqrt('n')+')')},

{id:'t',num:4,emo:'🧮',title:'מבחני t',
 goal:'להשוות ממוצעים כש-σ לא ידועה — יחיד, תלויים, בלתי-תלויים',
 what:`כש-σ <b>לא ידועה</b> (מעריכים אותה מהמדגם, Ŝ) — משתמשים ב-t. שלושה סוגים לפי מספר הממוצעים והאם המדגמים תלויים.`,
 theory:[
  `<b>מתי t ולא Z?</b> כש-σ לא ידועה — <b>תמיד</b> t, גם אם n גדול. משתמשים ב-Ŝ (ס״ת מדגם מתוקן, מחלקים ב-n−1).`,
  `<b>א. t לממוצע יחיד:</b> ${mq('t = '+frac('x̄ − μ₀','Ŝ/'+sqrt('n')))} , df = n−1.`,
  `<b>ב. t למדגמים תלויים</b> (זוגות / לפני-אחרי / אותם נבדקים): עובדים על <b>הפרשי הזוגות d</b>. ${mq('t = '+frac('d̄','Ŝ<sub>d</sub>/'+sqrt('n')))} , df = n−1 (n = מספר הזוגות). ⚠️ הסטטיסטי הוא d̄, ו-Ŝ<sub>d</sub> מחושב על ההפרשים.`,
  `<b>ג. t למדגמים בלתי-תלויים</b> (שתי קבוצות נפרדות): קודם שואלים — האם השונויות שוות? (<b>מבחן Levene</b>).`,
  `<b>שער Levene:</b> H0 = שונויות שוות. אם p &gt; 0.05 → שונויות שוות → משתמשים ב-<b>pooled</b> (Equal). אם p &lt; 0.05 → שונויות שונות → <b>Welch</b> (Unequal).`,
  `<div class="note"><b>שם המבחן:</b> ב-Excel בדיקת שוויון השונויות מופיעה כ-<b>F-Test Two-Sample for Variances</b> (F = Ŝ₁²/Ŝ₂²); המרצה קוראת לזה <b>Levene</b>. אותו רעיון — בודקים אם השונויות שוות לפני בחירת גרסת ה-t.</div>`,
  `<b>שונויות שוות (pooled):</b> ${mq('Ŝ<sub>p</sub>'+SUP['2']+' = '+frac('Ŝ₁'+SUP['2']+'(n₁−1) + Ŝ₂'+SUP['2']+'(n₂−1)','n₁ + n₂ − 2'))} , ${mq('SE = '+sqrt(frac('Ŝ<sub>p</sub>'+SUP['2'],'n₁')+' + '+frac('Ŝ<sub>p</sub>'+SUP['2'],'n₂')))} , df = n₁+n₂−2.`,
  `<b>שונויות שונות (Welch):</b> ${mq('SE = '+sqrt(frac('Ŝ₁'+SUP['2'],'n₁')+' + '+frac('Ŝ₂'+SUP['2'],'n₂')))} , df מתוקן (מהפלט).`,
  `<div class="note tip"><b>עיקרון "שתי רמות":</b> אם תוצאה מובהקת ב-0.05 אך לא ב-0.01 → |t| נמצא בין הקריטי של 0.05 (הנמוך) לקריטי של 0.01 (הגבוה).</div>`
 ],
 formulas:[
  {name:'t לממוצע יחיד',tex:mq('t = '+frac('x̄ − μ₀','Ŝ/'+sqrt('n'))+'  , df = n−1')},
  {name:'t למדגמים תלויים',tex:mq('t = '+frac('d̄','Ŝ<sub>d</sub>/'+sqrt('n'))+'  , df = n−1')},
  {name:'שונות משותפת (pooled)',tex:mq('Ŝ<sub>p</sub>'+SUP['2']+' = '+frac('Ŝ₁'+SUP['2']+'(n₁−1)+Ŝ₂'+SUP['2']+'(n₂−1)','n₁+n₂−2'))},
  {name:'Levene',tex:mq('F = '+frac('Ŝ₁'+SUP['2'],'Ŝ₂'+SUP['2'])+'  · p<0.05 → Welch')}
 ],

 guided:{title:'דוגמה מודרכת — t בלתי-תלויים, שונויות שוות',
  steps:[
   {t:'הנתונים',r:'קבוצה 1: x̄₁=6, Ŝ₁=1.8, n₁=8. קבוצה 2: x̄₂=3, Ŝ₂=1.5, n₂=8. שונויות שוות (Levene לא מובהק).'},
   {t:'שלב 1 — שונות משותפת',r:mq('Ŝ<sub>p</sub>'+SUP['2']+' = '+frac('1.8'+SUP['2']+'·7 + 1.5'+SUP['2']+'·7','14')+' = '+frac('22.68 + 15.75','14')+' = 2.745')},

  ]},

  {type:'num',q:'מדגמים תלויים: d̄=1.8, Ŝ_d=1.23, n=10. חשב t (עגל לשתי ספרות).',

   explain:'Ŝ_d מחושב על ההפרשים, לא על הציונים המקוריים.',tags:['paired_vs_independent','df_error']},

 theory:[
  `<b>הרעיון — פירוק השונות:</b> ${mq('F = '+frac('MS<sub>between</sub> (שונות בין הקבוצות = אפקט)','MS<sub>within</sub> (שונות בתוך הקבוצות = רעש)'))}. F גדול → ההבדל בין הקבוצות גדול יחסית לרעש → מובהק.`,
  `<b>דרגות חופש:</b> df<sub>between</sub> = k−1 · df<sub>within</sub> = N−k · df<sub>total</sub> = N−1. (k = מספר קבוצות, N = סך התצפיות).`,
  `<div class="note tip"><b>כלל השלמת טבלה:</b> SS ו-df <b>מתחברים</b> (SST=SSB+SSW). MS ו-F <b>לא</b> — אותם מחשבים: MS=SS/df, F=MSB/MSW. בלוח F: העמודה = df המונה (between), השורה = df המכנה (within).</div>`,
  `<b>מבחן ההמשך Scheffé:</b> ANOVA אומר <b>שיש</b> הבדל, לא <b>איפה</b>. Scheffé בודק זוגות: ${mq('F = '+frac('(x̄₁ − x̄₂)'+SUP['2'],'MSW/n₁ + MSW/n₂'))} , וערך קריטי מתוקן ${mq("F<sub>c</sub>' = F<sub>c</sub> · (k−1)")}. מובהק אם F &gt; F<sub>c</sub>'.`
 ],
 formulas:[
  {name:'סטטיסטי F',tex:mq('F = '+frac('MS<sub>between</sub>','MS<sub>within</sub>')+'  , MS = '+frac('SS','df'))},
  {name:'דרגות חופש',tex:mq('df<sub>B</sub>=k−1 , df<sub>W</sub>=N−k')},
  {name:'Scheffé',tex:mq("F<sub>c</sub>' = F<sub>c</sub> · (k−1)")}
 ],

{id:'anova2',num:7,emo:'🔀',title:'ANOVA דו-כיווני',
 goal:'שני גורמים, אפקטים עיקריים ואינטראקציה',
 what:`שני משתנים בלתי-תלויים קטגוריאליים. בודקים <b>שלושה</b> דברים בנפרד: אפקט עיקרי לגורם 1, אפקט עיקרי לגורם 2, ו<b>אינטראקציה</b>.`,
 theory:[
  `<b>אפקט עיקרי</b> — ההשפעה של כל גורם בנפרד (משווים את ממוצעי השוליים).`,
  `<b>אינטראקציה</b> — האם השפעת גורם אחד <b>תלויה</b> ברמת הגורם השני. df<sub>אינטראקציה</sub> = (R−1)(C−1). לכל אפקט F = MS<sub>effect</sub>/MSW.`,
  `<b>גרף הקווים — הכלי המרכזי:</b>`,
  `<table class="deftbl"><tr><th>הקווים בגרף</th><th>המשמעות</th></tr>
   <tr><td>מקבילים</td><td>אין אינטראקציה</td></tr>
   <tr><td>לא מקבילים</td><td>יש אינטראקציה (חשד)</td></tr>
   <tr><td>נחתכים</td><td>אינטראקציה חזקה</td></tr></table>`,
  `<div class="note tip">ייתכן אפקט עיקרי בלי אינטראקציה, ולהיפך. אם האינטראקציה <b>מובהקת</b> — מפרשים אותה קודם, כי השפעת גורם אחד משתנה לפי הגורם השני.</div>`
 ],
 formulas:[
  {name:'אפקט (לכל גורם ואינטראקציה)',tex:mq('F = '+frac('MS<sub>effect</sub>','MS<sub>within</sub>'))},
  {name:'df אינטראקציה',tex:mq('df = (R−1)(C−1)')}

  steps:[

   {t:'אפקט עיקרי גורם 1',r:'p=0.006 &lt; 0.05 → <b>מובהק</b>.'},

  ]},

{id:'chi',num:8,emo:'🎲',title:'חי-בריבוע (χ²)',
 goal:'טיב התאמה, אי-תלות, נצפה/צפוי, ועוצמת קשר',
 what:`מבחנים א-פרמטריים למשתנים <b>שמיים</b> — עובדים על <b>שכיחויות</b> (לא ממוצעים ולא אחוזים). תמיד חד-זנבי ימני, χ²≥0.`,
 theory:[
  `<b>הסטטיסטי:</b> ${mq('χ'+SUP['2']+' = Σ '+frac('(O − E)'+SUP['2'],'E'))} — O = שכיחות נצפית, E = שכיחות צפויה. אם נצפה=צפוי בדיוק → χ²=0.`,
  `<b>שני סוגים:</b>`,
  `<table class="deftbl"><tr><th>סוג</th><th>מתי</th><th>df</th><th>E</th></tr>
   <tr><td>טיב התאמה</td><td>משתנה שמי <b>אחד</b> — האם ההתפלגות תואמת מודל צפוי</td><td>k−1</td><td>לפי המודל</td></tr>
   <tr><td>אי-תלות</td><td><b>שני</b> משתנים שמיים — האם יש קשר</td><td>(r−1)(c−1)</td><td>${mq(frac('סכום שורה × סכום עמודה','N'))}</td></tr></table>`,
  `<b>הנחות:</b> תצפיות בלתי-תלויות · עובדים על שכיחויות · רצוי E≥5 בכל תא.`,
  `<b>עוצמת הקשר</b> (אחרי χ² מובהק): ${mq('r<sub>c</sub> = '+sqrt(frac('χ'+SUP['2'],'n(L−1)')))} — L = מספר הרמות של המשתנה עם פחות קטגוריות. φ ל-2×2, Cramér לגדול יותר.`
 ],
 formulas:[
  {name:'סטטיסטי χ²',tex:mq('χ'+SUP['2']+' = Σ '+frac('(O−E)'+SUP['2'],'E'))},
  {name:'צפוי באי-תלות',tex:mq('E = '+frac('סכום שורה × סכום עמודה','N'))},
  {name:'עוצמת קשר (Cramér/φ)',tex:mq('r<sub>c</sub> = '+sqrt(frac('χ'+SUP['2'],'n(L−1)')))}
 ],
 sim:'chi',
 guided:{title:'דוגמה מודרכת — χ² לאי-תלות (טבלה 2×2)',
  steps:[
   {t:'הנתונים',r:'גברים: 20/10 (סה״כ 30). נשים: 15/25 (סה״כ 40). עמודות: 35/35. N=70.'},
   {t:'שלב 1 — שכיחות צפויה',r:mq('E = '+frac('שורה × עמודה','N'))+' · לתא גברים-כן: 30·35/70 = 15. כל התאים: 15,15 / 20,20.'},
   {t:'שלב 2 — χ²',r:mq('χ'+SUP['2']+' = '+frac('(20−15)'+SUP['2'],'15')+' + '+frac('(10−15)'+SUP['2'],'15')+' + '+frac('(15−20)'+SUP['2'],'20')+' + '+frac('(25−20)'+SUP['2'],'20')+' = 1.67+1.67+1.25+1.25 = 5.83')},
   {t:'שלב 3 — הכרעה',r:'df=(2−1)(2−1)=1. χ² קריטי(1, 0.05)=3.841. 5.83 &gt; 3.841 → <b>דוחים H0</b>. עוצמה: √(5.83/70)=0.289.'}
  ]},
 quiz:[

  {type:'num',q:'טיב התאמה: N=50, מודל צפוי 80%/20%, נצפה 35/15. חשב χ² (עגל לשלוש ספרות).',

  {type:'mc',q:'בטבלת שכיחויות, הנצפה שווה בדיוק לצפוי בכל תא. ערך χ² יהיה:',
   opts:['גדול מאפס','שווה לאפס','קטן מאפס','לא ניתן לדעת'],correct:1,

  {type:'num',q:'χ² מובהק יצא 5.83, N=70, טבלה 2×2 (L=2). חשב את עוצמת הקשר φ (עגל לשלוש ספרות).',

  {type:'mc',q:'מבחן χ² הוא:',
   opts:['דו-זנבי','חד-זנבי ימני תמיד','חד-זנבי שמאלי','תלוי בהשערה'],correct:1,
   explain:'χ²≥0 ובודקים רק סטיות גדולות מהצפוי → זנב ימני בלבד.',tags:['one_tail_two_tail']}
 ]}
);

{id:'basics',num:0,emo:'🎯',title:'ריענון סטטיסטיקה א׳',

 theory:[

function pct(a,b){return b?Math.round(a/b*100):0;}

const SWQ={

   const nx=cur==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',nx);ST.theme=nx;save();updThemeBtn();},

   const h=(location.hash||'#/home').slice(2).split('/');
   const view=h[0]||'home',param=h[1];
   window.scrollTo(0,0);
   updGlobalProgress();
   if(view==='topic'&&param&&topicById(param))return renderTopic(param);
   if(view==='formulas')return renderFormulas();
   if(view==='tables')return renderTables();
   if(view==='glossary')return renderGlossary();
   if(view==='tree')return renderTree();

   if(view==='coach')return renderCoach();
   if(view==='flashcards')return renderFlashcards(param||'all');

 }
};
function updThemeBtn(){const b=document.getElementById('themeBtn');const d=(document.documentElement.getAttribute('data-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'))==='dark';b.textContent=d?'☀️':'🌙';}
function overallProgress(){return Math.round(TOPICS.reduce((s,t)=>s+(topicState(t.id).best||0),0)/TOPICS.length);}
function updGlobalProgress(){
   const p=overallProgress();
   const bar=document.getElementById('gpbar'),pc=document.getElementById('gpct');
   if(bar)bar.style.width=p+'%';if(pc)pc.textContent=p+'%';
   const N=TOPICS.length;
   const att=TOPICS.filter(t=>topicState(t.id).best>0).length;
   const dn=TOPICS.filter(t=>topicState(t.id).done).length;
   let s=0,c=0;TOPICS.forEach(t=>{const b=topicState(t.id).best;if(b){s+=b;c++;}});
   const avg=c?Math.round(s/c):0;
   const eAtt=document.getElementById('gAtt'),eDone=document.getElementById('gDone'),eAvg=document.getElementById('gAvg');
   if(eAtt)eAtt.textContent=att+'/'+N;
   if(eDone)eDone.textContent=dn+'/'+N;
   if(eAvg)eAvg.textContent=avg?avg+'%':'—';
}

 corr:{detect:'שאלה על קשר בין משתנים, רגרסיה, r, R² או Spearman.',formula:mq('t = '+frac('r',sqrt(frac('1 − r'+SUP['2'],'n − 2'))))+' · '+mq('ŷ = a + bx')+' · '+mq('r = ±'+sqrt('R'+SUP['2'])),trap:'R² אינו r; Multiple R הוא |r|; מתאם לא מוכיח סיבתיות.',conclusion:'p של השיפוע/מתאם < α → נמצא קשר מובהק.'},
 anova1:{detect:'משתנה תלוי כמותי וגורם קטגוריאלי עם 3+ קבוצות.',formula:mq('F = '+frac('MS<sub>B</sub>','MS<sub>W</sub>'))+' · '+mq('df<sub>B</sub> = k − 1')+' · '+mq('df<sub>W</sub> = N − k'),trap:'ANOVA מובהק אומר שיש הבדל איפשהו, לא איפה. צריך Scheffé.',conclusion:'F>Fcrit או p<α → לפחות שתי קבוצות שונות מובהקית.'},
 anova2:{detect:'משתנה תלוי כמותי ושני גורמים קטגוריאליים.',formula:'לכל אפקט: '+mq('F = '+frac('MS<sub>effect</sub>','MS<sub>W</sub>'))+' · '+mq('df<sub>int</sub> = (R−1)(C−1)'),trap:'אינטראקציה מובהקת מפרשים קודם; קווים מקבילים = אין אינטראקציה.',conclusion:'קוראים p נפרד ל-Sample/Rows, Columns ו-Interaction.'},
 chi:{detect:'משתנים שמיים ושכיחויות: התאמה למודל או קשר בטבלה.',formula:mq('χ'+SUP['2']+' = Σ '+frac('(O−E)'+SUP['2'],'E'))+' · '+mq('E = '+frac('שורה×עמודה','N'))+' באי-תלות',trap:'שכיחויות ולא אחוזים; χ² תמיד חד-זנבי ימני.',conclusion:'p<α → דוחים: אין התאמה / יש תלות בין המשתנים.'}
};

/* =================== QUIZ ENGINE =================== */
function mountQuiz(host,questions,opts){
 opts=opts||{};
 const answered=new Array(questions.length).fill(false);
 const correctArr=new Array(questions.length).fill(false);
 host.innerHTML=questions.map((q,i)=>questionCard(q,i,questions.length)).join('')+
   `<div id="quizresult"></div>`;
 // wire each question
 questions.forEach((q,i)=>wireQuestion(host,q,i,()=>{
   answered[i]=true;
   if(answered.every(Boolean))showQuizResult();
 },(ok)=>{correctArr[i]=ok;}));
 function showQuizResult(){
   const nc=correctArr.filter(Boolean).length,sc=pct(nc,questions.length);
   // update state
   if(opts.topicId){const s=topicState(opts.topicId);s.best=Math.max(s.best,sc);if(sc>=80)s.done=true;save();updGlobalProgress();}
   // diagnosis
   const wrongTags={};questions.forEach((q,i)=>{if(!correctArr[i])(q.tags||[]).forEach(tg=>wrongTags[tg]=(wrongTags[tg]||0)+1);});
   const tagRows=Object.keys(wrongTags).sort((a,b)=>wrongTags[b]-wrongTags[a]).map(tg=>
     `<div class="row weak"><span>${MTAG[tg]||tg}</span><b>${wrongTags[tg]} טעויות</b></div>`).join('');
   const emo=sc>=80?'🏆':sc>=60?'👍':'💪';
   const msg=sc>=80?'מצוין! פתחת את הנושא הבא.':sc>=60?'כמעט שם — כדאי לחזור על הנקודות החלשות.':'שווה לחזור על התיאוריה ולנסות שוב.';
   const host2=document.getElementById('quizresult');
   host2.innerHTML=`<div class="qcard result">
     <div class="big">${emo}</div>
     <div class="scoreline">${nc} / ${questions.length} נכון · ${sc}%</div>
     <p class="muted">${msg}</p>
     ${tagRows?`<div class="diag"><div class="eyebrow" style="margin-bottom:6px">איפה נפלת</div>${tagRows}</div>`:'<div class="diag"><div class="row strong"><span>אין טעויות חוזרות — כל הכבוד!</span><b>💯</b></div></div>'}
     <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px">
       <button class="btn ghost" onclick="renderTopicRetry('${opts.topicId||''}')">↻ נסה שוב</button>
       <button class="btn" onclick="SWQ.go('home')">→ למפה</button>
     </div>
   </div>`;
   host2.scrollIntoView({behavior:'smooth',block:'center'});
 }
}

function questionCard(q,i,total){
 let body='';
 if(q.type==='mc'||q.type==='tf'||(q.opts&&!q.type)){
   const opts=q.type==='tf'?['נכון','לא נכון']:q.opts;
   body=`<div class="opts" data-q="${i}">${opts.map((o,j)=>
     `<button class="opt" data-i="${j}"><span class="mk"></span><span>${o}</span></button>`).join('')}</div>`;
 } else { // num / multi
   const fields=(q.fields||[]).length?`<div class="fields">${q.fields.map((f,j)=>`<span class="lbl">${f.lbl}:</span><input type="text" inputmode="decimal" data-f="${j}" placeholder="תשובה"><span class="res" data-r="${j}"></span>`).join('')}</div>`:'';
   let choice='';
   if(q.choice){choice=`<div style="margin-top:8px"><div class="lbl" style="margin-bottom:6px">${q.choice.lbl}</div>
     <div class="opts" data-q="${i}">${q.choice.opts.map((o,j)=>`<button class="opt" data-i="${j}"><span class="mk"></span><span>${o}</span></button>`).join('')}</div></div>`;}
   body=fields+choice;
 }
 const tag=(q.tags&&q.tags[0])?`<span class="chip qtag ${q.type==='tf'?'grape':''}">${MTAG[q.tags[0]]||q.tags[0]}</span>`:'';
 return `<div class="qcard" data-qi="${i}">
   <div class="qhead"><span class="qnum">שאלה ${i+1} / ${total}</span>${tag}</div>
   <div class="qtext">${q.q}</div>
   ${body}
   <div class="qfoot"><button class="btn sm check" data-qi="${i}">✅ בדיקה</button></div>
   <div class="solvewrap"></div>
 </div>`;
}

function commonDistractorReason(q,opt){
 const tags=q.tags||[];
 if(tags.includes('one_tail_two_tail'))return 'המסיח מחליף בין חד-זנבי לדו-זנבי. הכיוון נקבע לפי H1, לא לפי התוצאה.';
 if(tags.includes('sd_vs_se'))return 'המסיח מערבב בין SD של תצפיות לבין SE של ממוצע מדגם.';
 if(tags.includes('z_vs_t'))return 'המסיח מפספס את כלל σ: ידועה → Z, לא ידועה → t.';
 if(tags.includes('levene_row'))return 'המסיח מפרש את Levene הפוך: p>0.05 פירושו לא דוחים שוויון שונויות.';
 if(tags.includes('pooled_vs_welch'))return 'המסיח בוחר את שורת ה-t הלא נכונה לפי מצב השונויות.';
 if(tags.includes('r_vs_r_squared'))return 'המסיח מבלבל בין r לבין R² או שוכח לקחת שורש.';
 if(tags.includes('anova_posthoc'))return 'המסיח מסיק יותר מדי מ-ANOVA. F מובהק אומר שיש הבדל, לא איפה.';
 if(tags.includes('interaction'))return 'המסיח מתעלם מהפרדה בין אפקטים עיקריים לבין אינטראקציה.';
 if(tags.includes('chi_expected'))return 'המסיח לא עובד עם שכיחויות צפויות E לפי הכלל המתאים.';
 if(tags.includes('p_value'))return 'המסיח משווה לא נכון בין p-value לבין α.';
 if(tags.includes('df_error'))return 'המסיח משתמש בדרגות חופש לא מתאימות למבחן.';
 return 'זה מסיח סביר רק אם מזהים לא נכון את סוג השאלה או את הנתון המרכזי.';
}
function distractorHTML(q,correct){
 if(correct==null||!(q.type==='mc'||q.type==='tf'||(q.opts&&!q.type)))return'';
 const opts=q.type==='tf'?['נכון','לא נכון']:q.opts;
 const why=q.whyWrong||[];
 return `<div class="distractors"><b>למה המסיחים נופלים</b>${opts.map((o,j)=>{
   const ok=j===correct;
   const txt=ok?'התשובה הזו מתאימה לכלל ולנתונים בשאלה.':(why[j]||commonDistractorReason(q,o));
   return `<div><span class="mq">${String.fromCharCode(1488+j)})</span> ${ok?'✅':'✗'} ${txt}</div>`;
 }).join('')}</div>`;
}
function wireQuestion(host,q,i,onDone,report){
 const card=host.querySelector(`.qcard[data-qi="${i}"]`);
 let selChoice=null,optCorrect=null;
 // option selection (mc/tf/choice)
 card.querySelectorAll('.opts .opt').forEach(btn=>btn.onclick=()=>{
   if(card.dataset.locked)return;
   card.querySelectorAll('.opts .opt').forEach(o=>o.classList.remove('sel'));
   btn.classList.add('sel');selChoice=+btn.dataset.i;
 });
 card.querySelector('.check').onclick=()=>{
   if(card.dataset.locked)return;
   let ok=true;const steps=q.steps||[];
   if(q.type==='mc'||q.type==='tf'||(q.opts&&!q.type)){
     const correct=q.type==='tf'?(q.correct?0:1):q.correct;
     optCorrect=correct;
     if(selChoice===null){flash(card);return;}
     ok=(selChoice===correct);
     card.querySelectorAll('.opts .opt').forEach(o=>{const j=+o.dataset.i;o.classList.add('disabled');
       if(j===correct)o.classList.add('correct');else if(j===selChoice)o.classList.add('wrong');});
   } else {
     // numeric fields
     (q.fields||[]).forEach((f,j)=>{
       const inp=card.querySelector(`input[data-f="${j}"]`);const res=card.querySelector(`.res[data-r="${j}"]`);
       const val=parseFloat(String(inp.value).replace(',','.').trim());
       const good=isFinite(val)&&Math.abs(val-f.ans)<=(f.tol!=null?f.tol:0.01);
       if(!good)ok=false;
       inp.style.borderColor=good?'var(--good)':'var(--bad)';
       res.innerHTML=good?'<span class="ok">✓</span>':`<span class="no">✗ (${f.ans})</span>`;
       inp.disabled=true;
     });
     if(q.choice){
       if(selChoice===null){ok=false;}
       card.querySelectorAll('.opts .opt').forEach(o=>{const jj=+o.dataset.i;o.classList.add('disabled');
         if(jj===q.choice.correct)o.classList.add('correct');else if(jj===selChoice)o.classList.add('wrong');});
       if(selChoice!==q.choice.correct)ok=false;
     }
   }
   card.dataset.locked='1';
   card.querySelector('.check').style.display='none';
   if(!ok)(q.tags||[]).forEach(tg=>addMistake(tg));save();
   const sw=card.querySelector('.solvewrap');
   sw.innerHTML=`<div class="solve ${ok?'good':'bad'}">
     <h4>${ok?'🎉 תשובה נכונה!':'📝 הפתרון'}</h4>
     ${steps.length?`<ol>${steps.map(s=>`<li>${esc(s)}</li>`).join('')}</ol>`:''}
     <div class="why">${q.explain||''}</div>
     ${distractorHTML(q,optCorrect)}
   </div>`;
   report(ok);onDone();
 };
}
function flash(card){card.style.transition='none';card.style.boxShadow='0 0 0 2px var(--gold)';setTimeout(()=>{card.style.transition='';card.style.boxShadow='';},400);}

let examTimer=null,examStart=0,CE=[],CENAME='';
function allExams(){return [{name:'מבחן מהיר — מעורב (20)',questions:EXAM}].concat(typeof EXAM_PACKS!=='undefined'?EXAM_PACKS:[]);}
function examBestOf(name){if(!ST.examBest||typeof ST.examBest!=='object')ST.examBest={};return ST.examBest[name]||0;}
function totalExamQ(){return allExams().reduce((s,e)=>s+e.questions.length,0);}
function renderExam(){
 const exs=allExams();
 const cards=exs.map((e,i)=>{const b=examBestOf(e.name);
   return `<button class="tcard" style="min-height:auto" onclick="startExamPack(${i})">
     <span class="emo">${i===0?'⚡':'📝'}</span>
     <h3 style="font-size:16.5px">${e.name}</h3>
     <span class="goal">${e.questions.length} שאלות · בלי רמזים · ציון ואבחון בסוף</span>
     <span class="foot"><span class="chip grape">${e.questions.length} שאלות</span>
       <span class="score" style="color:${b>=80?'var(--good)':b?'var(--gold)':'var(--ink-faint)'}">${b?'שיא '+b+'%':'התחל'}</span></span>
   </button>`;}).join('');
 app.innerHTML=`<div class="view">
   <div class="backrow"><button class="btn ghost sm" onclick="SWQ.go('home')">→ למפה</button>
     <span class="chip grape">⚡ מצב מבחן · ${exs.length} מבחנים · ${totalExamQ()} שאלות</span></div>
   <h1 style="margin:6px 0">⚡ מבחנים</h1>
   <p class="muted">בחר מבחן. עונים על הכל בתנאי מבחן (טיימר, בלי רמזים) ומקבלים ציון + אבחון טעויות. מבחן 5 בנוי כמו המבחן האמיתי (חלק א+ב).</p>
   <div class="grid" style="margin-top:16px">${cards}</div>
   <div style="height:24px"></div>
 </div>`;
}
function startExamPack(i){const ex=allExams()[i];CE=ex.questions;CENAME=ex.name;renderExamRunner();}
function renderExamRunner(){
 app.innerHTML=`<div class="view">
   <div class="backrow"><button class="btn ghost sm" onclick="stopExam();renderExam()">→ למבחנים</button>
     <span class="chip grape">${CENAME} · ${CE.length} שאלות</span></div>
   <div id="examhost"></div>
 </div>`;
 examStart=Date.now();
 const host=document.getElementById('examhost');
 const sel=new Array(CE.length).fill(null);
 host.innerHTML=`<div id="examtop" style="display:flex;justify-content:space-between;align-items:center;margin:6px 0">
   <span class="timer" id="examclock">00:00</span><span class="qnum" id="examcount">0/${CE.length} נענו</span></div>
   <div id="examqs">${CE.map((q,i)=>examCard(q,i)).join('')}</div>
   <div class="exam-nav">
     <span class="qnum" id="examcount2">0/${CE.length}</span>
     <button class="btn grape" id="submitExam">סיים והצג ציון ✓</button>
   </div>`;
 examTimer=setInterval(()=>{const s=Math.floor((Date.now()-examStart)/1000);
   const m=String(Math.floor(s/60)).padStart(2,'0'),ss=String(s%60).padStart(2,'0');
   const c=document.getElementById('examclock');if(c)c.textContent=m+':'+ss;else stopExam();},1000);
 CE.forEach((q,i)=>{
   const card=host.querySelector(`.qcard[data-qi="${i}"]`);
   card.querySelectorAll('.opts .opt').forEach(b=>b.onclick=()=>{
     card.querySelectorAll('.opts .opt').forEach(o=>o.classList.remove('sel'));b.classList.add('sel');
     sel[i]={c:+b.dataset.i};updExamCount();});
   card.querySelectorAll('input').forEach(inp=>inp.oninput=()=>{
     sel[i]=sel[i]||{};sel[i].nums=[...card.querySelectorAll('input')].map(x=>x.value);updExamCount();});
 });
 function updExamCount(){const n=sel.filter(x=>x&&(x.c!=null||(x.nums&&x.nums.some(v=>v!=='')))).length;
   ['examcount','examcount2'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=n+'/'+CE.length+(id==='examcount'?' נענו':'');});}
 document.getElementById('submitExam').onclick=()=>submitExam(sel);
 host.querySelector('#examqs').scrollIntoView({behavior:'smooth'});
}
function examCard(q,i){
 let body;
 if(q.type==='mc'||q.type==='tf'){const opts=q.type==='tf'?['נכון','לא נכון']:q.opts;
   body=`<div class="opts">${opts.map((o,j)=>`<button class="opt" data-i="${j}"><span class="mk"></span><span>${o}</span></button>`).join('')}</div>`;}
 else{body=`<div class="fields">${(q.fields||[]).map((f,j)=>`<span class="lbl">${f.lbl}:</span><input type="text" inputmode="decimal" data-f="${j}" placeholder="תשובה"><span class="res" data-r="${j}"></span>`).join('')}</div>`;}
 return `<div class="qcard" data-qi="${i}"><div class="qhead"><span class="qnum">שאלה ${i+1} / ${CE.length}</span></div>
   <div class="qtext">${q.q}</div>${body}<div class="solvewrap"></div></div>`;
}
function stopExam(){if(examTimer){clearInterval(examTimer);examTimer=null;}}
function submitExam(sel){
 stopExam();
 let nc=0;const wrongTags={};
 CE.forEach((q,i)=>{
   const card=document.querySelector(`.qcard[data-qi="${i}"]`);let ok=true,optCorrect=null;const s=sel[i]||{};
   if(q.type==='mc'||q.type==='tf'){const correct=q.type==='tf'?(q.correct?0:1):q.correct;
     optCorrect=correct;
     card.querySelectorAll('.opts .opt').forEach(o=>{const j=+o.dataset.i;o.classList.add('disabled');
       if(j===correct)o.classList.add('correct');else if(s.c===j)o.classList.add('wrong');});
     ok=(s.c===correct);
   } else {
     (q.fields||[]).forEach((f,j)=>{const inp=card.querySelector(`input[data-f="${j}"]`);
       const val=parseFloat(String(inp.value).replace(',','.'));const good=isFinite(val)&&Math.abs(val-f.ans)<=(f.tol!=null?f.tol:0.01);
       if(!good)ok=false;inp.disabled=true;inp.style.borderColor=good?'var(--good)':'var(--bad)';
       const rr=card.querySelector(`.res[data-r="${j}"]`);if(rr)rr.innerHTML=good?'<span class="ok">✓</span>':`<span class="no">✗ ${f.ans}</span>`;});
   }
   if(ok)nc++;else (q.tags||[]).forEach(tg=>{wrongTags[tg]=(wrongTags[tg]||0)+1;addMistake(tg);});
   const sw=card.querySelector('.solvewrap');
   sw.innerHTML=`<div class="solve ${ok?'good':'bad'}"><h4>${ok?'✓ נכון':'✗ '+ (q.explain||'')}</h4>${(q.steps||[]).length?`<ol>${q.steps.map(x=>`<li>${esc(x)}</li>`).join('')}</ol>`:`<div class="why">${q.explain||''}</div>`}${distractorHTML(q,optCorrect)}</div>`;
 });
 const sc=pct(nc,CE.length);const secs=Math.floor((Date.now()-examStart)/1000);
 if(!ST.examBest||typeof ST.examBest!=='object')ST.examBest={};
 if(sc>(ST.examBest[CENAME]||0))ST.examBest[CENAME]=sc;save();
 const tagRows=Object.keys(wrongTags).sort((a,b)=>wrongTags[b]-wrongTags[a]).slice(0,6).map(tg=>`<div class="row weak"><span>${MTAG[tg]||tg}</span><b>${wrongTags[tg]}</b></div>`).join('');
 const emo=sc>=85?'🏆':sc>=70?'👍':'💪';
 const res=document.createElement('div');res.className='qcard result';res.style.marginTop='16px';
 res.innerHTML=`<div class="big">${emo}</div><div class="scoreline">${nc}/${CE.length} · ${sc}%</div>
   <p class="muted">${CENAME} · זמן: ${Math.floor(secs/60)}:${String(secs%60).padStart(2,'0')} · שיא: ${ST.examBest[CENAME]}%</p>
   ${tagRows?`<div class="diag"><div class="eyebrow" style="margin-bottom:6px">נושאים לחזור עליהם</div>${tagRows}</div>`:'<div class="diag"><div class="row strong"><span>מבחן מושלם!</span><b>💯</b></div></div>'}
   <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap"><button class="btn ghost" onclick="SWQ.go('mistakes')">🧠 הטעויות שלי</button><button class="btn grape" onclick="renderExamRunner()">↻ אותו מבחן</button><button class="btn" onclick="renderExam()">→ מבחן אחר</button></div>`;
 document.getElementById('examhost').prepend(res);res.scrollIntoView({behavior:'smooth',block:'center'});
}

function fullTableHTML(k){
 let head='',body='',cap='';
 if(k==='Z'){
   cap='גוף הלוח = P(Z≤z), שטח מצטבר משמאל. שורה = ספרת האחדות והעשירית, עמודה = ספרת המאיות.';
   head='<th>z</th>'+Array.from({length:10},(_,c)=>`<th>.0${c}</th>`).join('');
   body=TBL.z.map(r=>`<tr><th>${r[0].toFixed(1)}</th>${r.slice(1).map(v=>`<td>${v.toFixed(4)}</td>`).join('')}</tr>`).join('');
 }else if(k==='t'){
   cap='ערכי t קריטיים. הכותרת = α דו-צדדי (למבחן חד-צדדי חצי מהערך: 0.05→0.025 וכו׳).';
   head='<th>df</th><th>0.10</th><th>0.05</th><th>0.02</th><th>0.01</th>';
   body=TBL.t.map(r=>`<tr><th>${r[0]}</th>${r.slice(1).map(v=>`<td>${v}</td>`).join('')}</tr>`).join('');
 }else if(k==='χ²'){
   cap='ערכי χ² קריטיים (זנב ימני). הכותרת = α. שורה = df.';
   head='<th>df</th><th>0.10</th><th>0.05</th><th>0.025</th><th>0.01</th>';
   body=TBL.chi.map(r=>`<tr><th>${r[0]}</th>${r.slice(1).map(v=>`<td>${v}</td>`).join('')}</tr>`).join('');
 }else if(k==='F'){
   cap='ערכי F קריטיים ל-α=0.05. עמודה = df המונה (between), שורה = df המכנה (within).';
   head='<th>מכנה↓ · מונה→</th>'+TBL.f1.map(d=>`<th>${d}</th>`).join('');
   body=TBL.f.map(r=>`<tr><th>${r[0]}</th>${r.slice(1).map(v=>`<td>${v}</td>`).join('')}</tr>`).join('');
 }else return '';
 return `<details class="fulltbl"><summary>📋 הצג לוח מלא</summary>
   <p class="faint" style="font-size:12.5px;margin:8px 2px">${cap}</p>
   <div class="tblwrap"><table class="deftbl reftbl"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>
 </details>`;
}

 {t:'p-value',d:'ההסתברות לקבל תוצאה קיצונית כמו זו שנצפתה (או יותר) אם H₀ נכונה.',u:'משווים ל-α: p<α → דוחים H₀.',x:'p אינו "הסתברות ש-H₀ נכונה". p קטן = עדות נגד H₀, לא הוכחה.'},
 {t:'טעות סוג I / II',d:'סוג I = דחיית H₀ נכונה (הסתברות α) · סוג II = אי-דחיית H₀ שגויה (הסתברות β).',u:'שיקול באיזון בין α ל-β ובתכנון עוצמה.',x:'α↓ מקטין סוג I אך מגדיל את β (סוג II) — יש trade-off.'},
 {t:'עוצמה (Power)',d:'1−β = ההסתברות לדחות H₀ כשהיא באמת שגויה (לגלות אפקט אמיתי).',u:'תכנון מדגם: כמה נבדקים צריך כדי לגלות אפקט.',x:'הדרך הבטוחה להעלות עוצמה היא להגדיל את n (לא להגדיל את α).'},

function stripHTML(s){const d=document.createElement('div');d.innerHTML=String(s||'');return (d.textContent||d.innerText||'').replace(/\s+/g,' ').trim();}
function allFlashcards(){
 const cards=[];
 GLOSSARY.forEach((g,i)=>cards.push({id:'term-'+i,set:'terms',front:g.t,back:`${g.d}<br><b>איפה משתמשים:</b> ${g.u}<br><b>מלכודת:</b> ${g.x}`}));
 FSHEET.forEach((g,gi)=>g.items.forEach((f,fi)=>cards.push({id:'formula-'+gi+'-'+fi,set:'formulas',front:f.name,back:`${f.tex}<br><b>מתי:</b> ${f.when}<br><b>מלכודת:</b> ${f.trap}`})));
 COMMON_TRAPS.forEach((t,i)=>cards.push({id:'trap-'+i,set:'traps',front:t[0],back:t[1]}));
 XL_MISTAKES.forEach((t,i)=>cards.push({id:'excel-mist-'+i,set:'excel',front:t[0],back:t[1]}));
 EXCEL_FIRST.forEach((t,i)=>cards.push({id:'excel-field-'+i,set:'excel',front:t[0],back:t[1]}));
 return cards;
}

function searchIndex(){
 const out=[];
 TOPICS.forEach(t=>out.push({kind:'נושא',title:t.title,desc:t.goal,text:stripHTML([t.title,t.goal,t.what,t.theory.join(' '),t.formulas.map(f=>f.name).join(' '),t.quiz.map(q=>q.q+' '+(q.explain||'')).join(' ')].join(' ')).toLowerCase(),go:`SWQ.go('topic','${t.id}')`}));
 GLOSSARY.forEach(g=>out.push({kind:'מושג',title:g.t,desc:g.d,text:stripHTML(g.t+' '+g.d+' '+g.u+' '+g.x).toLowerCase(),go:`SWQ.go('glossary')`}));
 FSHEET.forEach(g=>g.items.forEach(f=>out.push({kind:'נוסחה',title:f.name,desc:f.when,text:stripHTML(f.name+' '+f.when+' '+f.sym+' '+f.trap).toLowerCase(),go:`SWQ.go('formulas')`})));
 XLTESTS.forEach(x=>out.push({kind:'Excel',title:x.name,desc:x.when,text:stripHTML(x.name+' '+x.when+' '+(x.note||'')+' '+(x.steps||[]).join(' ')).toLowerCase(),go:`SWQ.go('excelhow')`}));
 EXCEL.forEach(x=>x.q.forEach(q=>out.push({kind:'שאלת Excel',title:x.title,desc:q.q,text:stripHTML(x.title+' '+q.q+' '+(q.explain||'')).toLowerCase(),go:`SWQ.go('excel')`})));
 TEST_COACH.forEach(q=>out.push({kind:'מאמן בחירת מבחן',title:q.q,desc:q.explain,text:stripHTML(q.q+' '+q.explain+' '+q.opts.join(' ')).toLowerCase(),go:`SWQ.go('coach')`}));
 allExams().forEach(e=>e.questions.forEach(q=>out.push({kind:'שאלת מבחן',title:e.name,desc:q.q,text:stripHTML(e.name+' '+q.q+' '+(q.explain||'')+' '+((q.opts||[]).join(' '))).toLowerCase(),go:`SWQ.go('exam')`})));
 GOLDEN_RULES.forEach((r,i)=>out.push({kind:'כלל זהב',title:'כלל '+(i+1),desc:r,text:r.toLowerCase(),go:`SWQ.go('examkit')`}));
 COMMON_TRAPS.forEach(r=>out.push({kind:'מלכודת',title:r[0],desc:r[1],text:(r[0]+' '+r[1]).toLowerCase(),go:`SWQ.go('examkit')`}));
 return out;

function runGlobalSearch(){
 const inp=document.getElementById('globalSearch');if(!inp)return;
 const q=inp.value.trim().toLowerCase();
 const host=document.getElementById('globalResults');
 if(!q){host.innerHTML='<div class="empty">כתוב מושג, נוסחה, מבחן, Excel או מלכודת.</div>';return;}
 const words=q.split(/\s+/).filter(Boolean);
 const res=searchIndex().map(r=>{let score=0;words.forEach(w=>{if(r.title.toLowerCase().includes(w))score+=4;if(r.text.includes(w))score+=1;});return{...r,score};}).filter(r=>r.score>0).sort((a,b)=>b.score-a.score).slice(0,35);
 host.innerHTML=res.length?res.map(r=>`<button class="result-card" onclick="${r.go}"><span class="kind">${r.kind}</span><b>${r.title}</b><span>${stripHTML(r.desc).slice(0,180)}</span></button>`).join(''):'<div class="empty">לא נמצאו תוצאות. נסה מילה אחרת כמו p-value, Levene, רווח סמך, ANOVA או Excel.</div>';
}
function setSearch(q){const inp=document.getElementById('globalSearch');if(inp){inp.value=q;runGlobalSearch();inp.focus();}}
function renderSearch(){
 app.innerHTML=`<div class="view">
   <div class="backrow"><button class="btn ghost sm" onclick="SWQ.go('home')">→ למפה</button><span class="chip">🔎 חיפוש גלובלי</span></div>

   <div class="flash-tabs" style="margin-bottom:8px">${['Levene','R Square','רווח סמך','one-tail','χ²','ANOVA','SD מול SE'].map(q=>`<button onclick="setSearch('${q}')">${q}</button>`).join('')}</div>

/* =================== math for sims =================== */
function erf(x){const s=x<0?-1:1;x=Math.abs(x);const t=1/(1+0.3275911*x);
 const y=1-(((((1.061405429*t-1.453152027)*t)+1.421413741)*t-0.284496736)*t+0.254829592)*t*Math.exp(-x*x);return s*y;}
function Phi(z){return 0.5*(1+erf(z/Math.SQRT2));}
function gauss(x,mu,sd){return Math.exp(-((x-mu)*(x-mu))/(2*sd*sd));}
function randn(){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
function curvePath(cx,sdpx,peak,baseY,x0,x1){let d='';for(let x=x0;x<=x1;x+=4){const y=baseY-peak*gauss(x,cx,sdpx);d+=(x===x0?'M':'L')+x.toFixed(1)+' '+y.toFixed(1);}return d;}
function ctrl(id,label,min,max,step,val,fmt){return `<div class="ctrl"><label>${label}<b id="${id}v">${fmt?fmt(val):val}</b></label><input type="range" id="${id}" min="${min}" max="${max}" step="${step}" value="${val}"></div>`;}
function ro(items){return `<div class="readout">${items.map(i=>`<div class="r">${i[0]}<b id="${i[2]||''}">${i[1]}</b></div>`).join('')}</div>`;}

  const sigma=15;function draw(){const n=+host.querySelector('#sn').value;host.querySelector('#snv').textContent=n;
   const cx=300,baseY=210,pxU=520/(8*sigma);const sdPop=sigma*pxU,sdSamp=(sigma/Math.sqrt(n))*pxU;

   host.querySelector('#sSE').textContent=(sigma/Math.sqrt(n)).toFixed(2);

 },
 power(host){
  host.innerHTML=`<div class="faint" style="font-size:13.5px;margin-bottom:8px">שתי העקומות: H₀ (שמאל) ו-H₁ (ימין). הקו המקווקו = ערך קריטי. אדום=α, כתום=β, ירוק=עוצמה.</div>
   <svg viewBox="0 0 600 250"><g id="psvg"></g></svg>
   ${ctrl('pd','גודל אפקט (יחידות SE)',0.5,4,0.1,2,v=>(+v).toFixed(1))}
   ${ctrl('pa','α',0.01,0.10,0.01,0.05,v=>(+v).toFixed(2))}
   ${ro([['α (טעות I)','0.050','pA'],['β (טעות II)','0.','pB'],['עוצמה 1−β','0.','pP']])}`;

   g.innerHTML=`<line x1="30" y1="205" x2="570" y2="205" stroke="var(--line)" stroke-width="1.5"/>
     ${shade(x1,30,critX,'var(--gold)',0.5)}
     ${shade(x1,critX,570,'var(--good)',0.4)}

     <path d="${curvePath(x1,sd,peak,baseY,30,570)}" fill="none" stroke="var(--teal)" stroke-width="2.2"/>

     <text x="${x1}" y="226" text-anchor="middle" font-size="12" fill="var(--teal-deep)">H₁</text>`;
   host.querySelector('#pA').textContent=a.toFixed(3);
   host.querySelector('#pB').textContent=beta.toFixed(3);

 },
 ci(host){

 },
 tchooser(host){
  host.innerHTML=`<div class="faint" style="font-size:13.5px;margin-bottom:8px">בחר את מבנה הנתונים, וראה איזה מבחן t מתאים. במדגמים בלתי-תלויים — שער Levene מחליט.</div>
   <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:12px">
     <button class="btn ghost sm td" data-t="one">ממוצע יחיד</button>
     <button class="btn ghost sm td" data-t="paired">מדגמים תלויים</button>
     <button class="btn ghost sm td" data-t="ind">מדגמים בלתי-תלויים</button>
   </div>
   <div id="tcout"></div>`;
  const out=host.querySelector('#tcout');
  function box(t,d,f){return `<div class="card" style="padding:16px"><b>${t}</b><div class="faint" style="font-size:13.5px;margin:5px 0">${d}</div><div class="formula" style="margin:6px 0 0">${mq(f)}</div></div>`;}
  function show(t){host.querySelectorAll('.td').forEach(b=>{const on=b.dataset.t===t;b.style.background=on?'var(--teal)':'';b.style.color=on?'#fff':'';});
   if(t==='one')out.innerHTML=box('t לממוצע יחיד','σ לא ידועה → משתמשים ב-Ŝ.','t=(x̄−μ₀)/(Ŝ/√n) · df=n−1');
   else if(t==='paired')out.innerHTML=box('t למדגמים תלויים','אותם נבדקים / זוגות. עובדים על ההפרשים d.','t=d̄/(Ŝ_d/√n) · df=n−1');
   else{out.innerHTML=`<div class="card" style="padding:16px"><b>⚖️ שער Levene</b>
     <div class="faint" style="font-size:13px;margin:6px 0">הזז את p-value של מבחן Levene:</div>
     ${ctrl('lev','p-value של Levene',0.001,0.30,0.001,0.20,v=>(+v).toFixed(3))}
     <div id="levout" style="margin-top:10px"></div></div>`;
    const lv=host.querySelector('#lev');function ld(){const p=+lv.value;host.querySelector('#levv').textContent=p.toFixed(3);
     const eq=p>0.05;host.querySelector('#levout').innerHTML=`<div class="note ${eq?'tip':'trap'}" style="margin:0">
       ${eq?'✅ p &gt; 0.05 → <b>שונויות שוות</b> → t עם שונות משותפת (pooled), df=n₁+n₂−2':'❌ p &lt; 0.05 → <b>שונויות שונות</b> → t מסוג Welch, df מתוקן'}</div>`;}
     lv.oninput=ld;ld();}
  }
  host.querySelectorAll('.td').forEach(b=>b.onclick=()=>show(b.dataset.t));show('one');
 },
 pearson(host){
  host.innerHTML=`<div class="faint" style="font-size:13.5px;margin-bottom:8px">ענן נקודות עם מתאם r נתון. שנה את r וראה כיצד הנקודות והשיפוע משתנים. R² = אחוז השונות המוסברת.</div>
   <svg viewBox="0 0 600 260"><g id="prsvg"></g></svg>
   ${ctrl('pr','מתאם r',-0.95,0.95,0.05,0.7,v=>(+v).toFixed(2))}
   ${ro([['r','0.70','prR'],['R² (שונות מוסברת)','49%','prR2'],['עוצמת הקשר','','prS']])}`;
  const N=45;let base=Array.from({length:N},()=>[randn(),randn()]);
  function draw(){const r=+host.querySelector('#pr').value;host.querySelector('#prv').textContent=r.toFixed(2);
   const g=host.querySelector('#prsvg');const pts=base.map(([x,e])=>{const y=r*x+Math.sqrt(Math.max(0,1-r*r))*e;return [x,y];});

   let dots=pts.map(([x,y])=>`<circle cx="${mapX(x).toFixed(1)}" cy="${Math.max(12,Math.min(248,mapY(y))).toFixed(1)}" r="4" fill="var(--teal)" opacity="0.7"/>`).join('');
   const x1=mapX(-2.6),x2=mapX(2.6),y1=mapY(r*-2.6),y2=mapY(r*2.6);

     <line x1="300" y1="15" x2="300" y2="245" stroke="var(--line-soft)" stroke-width="1"/>
     <line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="var(--coral)" stroke-width="2.4"/>${dots}`;
   host.querySelector('#prR').textContent=r.toFixed(2);host.querySelector('#prR2').textContent=Math.round(r*r*100)+'%';
   const ar=Math.abs(r);host.querySelector('#prS').textContent=ar>=0.5?'חזק':ar>=0.3?'בינוני':ar>=0.1?'חלש':'זניח';}

 },
 anova(host){
  host.innerHTML=`<div class="faint" style="font-size:13.5px;margin-bottom:8px">שלוש קבוצות. הזז את הממוצעים וראה כיצד היחס בין השונות שבין הקבוצות לשונות שבתוכן קובע את F.</div>
   <svg viewBox="0 0 600 220"><g id="asvg"></g></svg>
   ${ctrl('am1','ממוצע קבוצה A',2,18,0.5,7)}
   ${ctrl('am2','ממוצע קבוצה B',2,18,0.5,10)}
   ${ctrl('am3','ממוצע קבוצה C',2,18,0.5,13)}
   ${ro([['שונות בין (MSB)','','aB'],['שונות בתוך (MSW)','','aW'],['F = MSB/MSW','','aF'],['מסקנה (α=.05)','','aC']])}`;
  const n=8,sdw=2.2;function draw(){const m=[+host.querySelector('#am1').value,+host.querySelector('#am2').value,+host.querySelector('#am3').value];
   ['am1','am2','am3'].forEach((id,i)=>host.querySelector('#'+id+'v').textContent=m[i]);
   const grand=(m[0]+m[1]+m[2])/3;const SSB=n*m.reduce((s,x)=>s+(x-grand)*(x-grand),0);const MSB=SSB/2;
   const MSW=sdw*sdw;const F=MSB/MSW;const g=host.querySelector('#asvg');const cols=['var(--teal)','var(--grape)','var(--gold)'];
   const mapY=v=>200-(v-1)*10;let els='';
   m.forEach((mm,gi)=>{const cx=140+gi*160;for(let k=0;k<n;k++){const jit=(k-3.5)*7;const yy=mapY(mm+randn()*0.9);
     els+=`<circle cx="${(cx+jit).toFixed(1)}" cy="${Math.max(14,Math.min(198,yy)).toFixed(1)}" r="3.5" fill="${cols[gi]}" opacity="0.65"/>`;}
     els+=`<line x1="${cx-42}" y1="${mapY(mm).toFixed(1)}" x2="${cx+42}" y2="${mapY(mm).toFixed(1)}" stroke="${cols[gi]}" stroke-width="3"/>
       <text x="${cx}" y="214" text-anchor="middle" font-size="12" fill="var(--ink-soft)">${['A','B','C'][gi]}</text>`;});
   g.innerHTML=`<line x1="40" y1="${mapY(grand).toFixed(1)}" x2="560" y2="${mapY(grand).toFixed(1)}" stroke="var(--ink-faint)" stroke-width="1.5" stroke-dasharray="5 4"/>${els}`;
   const Fc=3.47;
   host.querySelector('#aB').textContent=MSB.toFixed(1);host.querySelector('#aW').textContent=MSW.toFixed(1);
   host.querySelector('#aF').textContent=F.toFixed(2);
   const cEl=host.querySelector('#aC');cEl.textContent=F>Fc?'דוחים H0':'לא דוחים';cEl.style.color=F>Fc?'var(--good)':'var(--coral)';}
  ['am1','am2','am3'].forEach(id=>host.querySelector('#'+id).oninput=draw);draw();
 },
 twoway(host){
  host.innerHTML=`<div class="faint" style="font-size:13.5px;margin-bottom:8px">גרף אינטראקציה: שני גורמים. הזז את ממוצעי התאים — קווים מקבילים = אין אינטראקציה, נחתכים = אינטראקציה.</div>
   <svg viewBox="0 0 600 240"><g id="wsvg"></g></svg>

     <text x="${xB+8}" y="${mapY(d)}" font-size="11" fill="var(--grape)">גורם1 גבוה</text>`;
   const slope1=b-a,slope2=d-c;const diff=Math.abs(slope1-slope2);
   const cross=(a-c)*(b-d)<0;const el=host.querySelector('#wI');
   if(cross){el.textContent='כן — חזקה (קווים נחתכים)';el.style.color='var(--coral)';}

 },
 chi(host){
  host.innerHTML=`<div class="faint" style="font-size:13.5px;margin-bottom:8px">טבלת 2×2 של שכיחויות נצפות (O). ערוך את המספרים — המערכת מחשבת צפוי (E), תרומת כל תא, ו-χ². תא בולט = תורם הרבה.</div>
   <div id="chitbl"></div>
   ${ro([['χ²','','xC'],['df','1','xdf'],['χ² קריטי (0.05)','3.841'],['מסקנה','','xM']])}`;
  const O=[[20,10],[15,25]];
  function draw(){const rs=[O[0][0]+O[0][1],O[1][0]+O[1][1]];const cs=[O[0][0]+O[1][0],O[0][1]+O[1][1]];const N=rs[0]+rs[1];
   let chi=0;const E=[[0,0],[0,0]],contrib=[[0,0],[0,0]];
   for(let i=0;i<2;i++)for(let j=0;j<2;j++){E[i][j]=rs[i]*cs[j]/N;const c=Math.pow(O[i][j]-E[i][j],2)/(E[i][j]||1);contrib[i][j]=c;chi+=c;}
   const maxc=Math.max(contrib[0][0],contrib[0][1],contrib[1][0],contrib[1][1],0.01);
   let html='<div class="tblwrap"><table class="deftbl" style="text-align:center"><tr><th></th><th>עמודה 1</th><th>עמודה 2</th><th>Σ שורה</th></tr>';
   for(let i=0;i<2;i++){html+='<tr><th>שורה '+(i+1)+'</th>';for(let j=0;j<2;j++){const op=0.12+0.5*(contrib[i][j]/maxc);
     html+=`<td style="background:rgba(216,89,63,${op.toFixed(2)})"><input type="text" inputmode="numeric" data-i="${i}" data-j="${j}" value="${O[i][j]}" style="width:52px;text-align:center;font-family:var(--mono);padding:6px;border-radius:8px;border:1.4px solid var(--line);background:var(--card)"><div class="faint" style="font-size:11px">E=${E[i][j].toFixed(1)}</div></td>`;}
     html+='<td class="k">'+rs[i]+'</td></tr>';}
   html+='<tr><th>Σ עמודה</th><td class="k">'+cs[0]+'</td><td class="k">'+cs[1]+'</td><td class="k">'+N+'</td></tr></table></div>';
   host.querySelector('#chitbl').innerHTML=html;
   host.querySelector('#xC').textContent=chi.toFixed(2);
   const m=host.querySelector('#xM');m.textContent=chi>3.841?'דוחים H0 (יש קשר)':'לא דוחים';m.style.color=chi>3.841?'var(--good)':'var(--coral)';
   host.querySelectorAll('#chitbl input').forEach(inp=>inp.onchange=()=>{const i=+inp.dataset.i,j=+inp.dataset.j;const v=parseInt(inp.value);O[i][j]=isFinite(v)&&v>=0?v:0;draw();});}
  draw();
 }
};
